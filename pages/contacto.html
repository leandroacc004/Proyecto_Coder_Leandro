<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="¿Tienes dudas sobre un juego? Contáctanos. Estamos para ayudarte con tus compras y pedidos especiales.">
    <title>Contacto | Soporte Gamer Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-black">
            <div class="container">
                <a class="navbar-brand" href="../index.html">GAMER STORE</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li><a class="nav-link" href="../index.html">Inicio</a></li>
                        <li><a class="nav-link" href="productos.html">Productos</a></li>
                        <li><a class="nav-link" href="nosotros.html">Nosotros</a></li>
                        <li><a class="nav-link" href="lanzamientos.html">Lanzamientos</a></li>
                        <li><a class="nav-link active" href="contacto.html">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-contacto">
        <h1 class="text-center mt-5">Contáctanos</h1>
        <form class="form-flex mt-4 mx-auto p-4 border border-primary rounded bg-black">
            <fieldset>
                <legend class="text-primary-color">Tus Datos</legend>
                <div class="mb-3">
                    <label for="name_form" class="form-label">Nombre</label>
                    <input type="text" id="name_form" class="form-control" placeholder="Ej: Leonardo" required>
                </div>
                <div class="mb-3">
                    <label for="mail_input" class="form-label">Correo Electrónico</label>
                    <input type="email" id="mail_input" class="form-control" placeholder="correo@ejemplo.com" required>
                </div>
            </fieldset>
            <fieldset>
                <legend class="text-primary-color">Mensaje</legend>
                <div class="mb-3">
                    <textarea id="asunto_form" class="form-control" rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Enviar Consulta</button>
                    <button type="reset" class="btn btn-outline-danger">Limpiar</button>
                </div>
            </fieldset>
        </form>
    </main>

    <footer class="bg-black text-white py-4 mt-5">
        <div class="container text-center">
            <p>Copyright © 2025 - Sitio hecho por Leonardo Caramantin</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
